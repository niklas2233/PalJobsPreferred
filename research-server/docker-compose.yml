networks:
  palworld-research:

services:
  palworld-dedicated-server:
    container_name: palworld-research-server
    image: ghcr.io/ripps818/docker-palworld-dedicated-server-wine:latest
    restart: "no"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    # mode: host is NOT used here (unlike the live server's compose file):
    # this image's game process always binds UDP 8211 internally regardless
    # of PublicPort/any other setting (confirmed via /proc/net/udp), and
    # mode: host requires published to literally equal that internal port,
    # which would collide with the live server (also fixed at 8211
    # internally). Plain Docker NAT (the default without mode: host) can
    # actually remap published:8241 -> the real internal port 8211.
    ports:
      - target: 8211
        published: 8241
        protocol: udp
      - target: 8212
        published: 8242
        protocol: tcp
      - target: 25575
        published: 25595
        protocol: tcp
      - target: 27015
        published: 27045
        protocol: tcp
    env_file:
      - ./stack.env
    volumes:
      - /mnt/config/palworld-research:/palworld
    networks:
      - palworld-research
