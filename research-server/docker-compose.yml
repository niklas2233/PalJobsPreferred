networks:
  palworld-research:

services:
  palworld-dedicated-server:
    container_name: palworld-research-server
    image: ghcr.io/ripps818/docker-palworld-dedicated-server-wine:latest
    restart: "no"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - target: 8215
        published: 8241
        protocol: udp
        mode: host
      - target: 8216
        published: 8242
        protocol: tcp
        mode: host
      - target: 25576
        published: 25595
        protocol: tcp
        mode: host
      - target: 27016
        published: 27045
        protocol: tcp
    env_file:
      - ./stack.env
    volumes:
      - /mnt/config/palworld-research:/palworld
    networks:
      - palworld-research
